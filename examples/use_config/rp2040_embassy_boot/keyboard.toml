[keyboard]
name = "RMK Keyboard"
product_name = "RMK Keyboard RP2040 embassy-boot use_config example"
vendor_id = 0x4c4b
product_id = 0x4643
manufacturer = "haobo"
chip = "rp2040"

[matrix]
row_pins = ["PIN_6", "PIN_7", "PIN_8", "PIN_9"]
col_pins = ["PIN_19", "PIN_20", "PIN_21"]

[layout]
rows = 4
cols = 3
layers = 2
keymap = [
    [
        ["A", "B", "C"],
        ["Kc1", "Kc2", "Kc3"],
        ["LCtrl", "MO(1)", "LShift"],
        ["OSL(1)", "LT(2, Kc9)", "LM(1, LShift | LGui)"],
    ],
    [
        ["_", "TT(1)", "TG(2)"],
        ["_", "_", "_"],
        ["_", "_", "_"],
        ["_", "_", "_"],
    ],
]

[storage]
enabled = true

# DFU partition layout — must match your bootloader's memory.x
#
# By default RMK uses the bootymcbootface formula with flash_size from the
# chip default (2 MB for RP2040).
# Calculation: 
# 2 * 1024 * 1024;    // 2 MB (default)
# 4 * 1024 * 1024;    // 4 MB
# and so on
# Uncomment and adjust to override:
# [dfu]
# flash_size = 2097152   # total flash (default: 2 MB)
#
# To set addresses manually, uncomment and edit the values below.
# Doing so disables the auto-calculation:
# state_offset = 0x6000
# state_size = 0x1000
# dfu_offset = 0x87000
# dfu_size = 528384
# Optional DFU activity LED (lit during firmware download)
# led = "PIN_25"

[dfu]
led = "PIN_25"
# Optional DFU lock — physical keys to press simultaneously to unlock DFU firmware download.
# Requires the `dfu_lock` Cargo feature (not enabled by default).
# unlock_keys = [[0, 0], [0, 1]]

[rmk]
morse_max_num = 8
max_patterns_per_key = 8
