[keyboard]
name = "RMK nRF52840 Keyboard"
product_name = "My RMK Keyboard"
vendor_id = 0x4c4b
product_id = 0x4643
manufacturer = "Haobo"
chip = "nrf52840"

[matrix]
row_pins = ["P0_07", "P0_22", "P0_11", "P0_12"]
col_pins = ["P0_13", "P0_17", "P0_20"]

[layout]
rows = 4
cols = 3
layers = 1
matrix_map = """
(0,0) (0,1) (0,2)
(1,0) (1,1) (1,2)
(2,0) (2,1) (2,2)
(3,0) (3,1) (3,2)
"""

[[layer]]
name = "base_layer"
keys = """
Kp7 Kp8 Kp9
Kp4 Kp5 Kp6
Kp1 Kp2 Kp3
    Kp0
"""

[usb]
enabled = true

[ble]
enabled = true

[dfu]
led = "P0_15"
# Optional DFU lock — physical keys to press simultaneously to unlock DFU firmware download.
# Requires the `dfu_lock` Cargo feature (not enabled by default).
# unlock_keys = [[0, 0], [1, 1]]

