[package]
name = "rmk-nrf54lm20"
version = "0.1.0"
authors = ["Haobo Gu <haobogu@outlook.com>"]
description = "Keyboard firmware written in Rust"
homepage = "https://github.com/haobogu/rmk"
repository = "https://github.com/haobogu/rmk"
readme = "../../README.md"
edition = "2024"
license = "MIT OR Apache-2.0"

[dependencies]
# Flipped to the new rmk_protocol host service (USB bulk + BLE GATT). Default
# rmk features include `vial`, which is mutually exclusive with `rmk_protocol`,
# so disable defaults and re-add `defmt` + `storage` by hand.
rmk = { path = "../../../rmk", default-features = false, features = [
    "async_matrix",
    "nrf54lm20_ble",
    "rmk_protocol",
    "bulk_transfer",
    "defmt",
    "storage",
] }
nrf-sdc = { path = "/Users/haobogu/Projects/rust/nrf-sdc/nrf-sdc", default-features = false, features = [
    "defmt",
    "peripheral",
    "central",
    "nrf54lm20-app-s",
] }
# nrf-mpsl = { git = "https://github.com/haobogu/nrf-sdc", rev = "79a971c4388ed26b54ff09a990673e8af0871b1b", default-features = false, features = [
nrf-mpsl = { path = "/Users/haobogu/Projects/rust/nrf-sdc/nrf-mpsl", default-features = false, features = [
    "defmt",
    "critical-section-impl",
    "nrf54lm20-app-s",
] }
bt-hci = { version = "0.8", features = ["defmt"] }

cortex-m = "0.7.7"
cortex-m-rt = "0.7.5"
embassy-time = { version = "0.5", features = ["defmt", "defmt-timestamp-uptime"] }
embassy-nrf = { version = "0.10", features = [
    "defmt",
    "nrf54lm20-app-s",
    "time-driver-grtc",
    "gpiote",
    "unstable-pac",
    "time",
] }
embassy-executor = { version = "0.10", features = [
    "defmt",
    "platform-cortex-m",
    "executor-thread",
] }
defmt = "1.0"
defmt-rtt = "1.0"
panic-probe = { version = "1.0", features = ["print-defmt"] }
static_cell = "2"

rand_core = { version = "0.6" }
rand_chacha = { version = "0.3", default-features = false }

[build-dependencies]
xz2 = "0.1.7"
json = "0.12"
const-gen = "1.6"

[[bin]]
name = "rmk-nrf54lm20"
test = false
bench = false

[profile.dev]
codegen-units = 1
debug = true
opt-level = 1
overflow-checks = true
lto = false
panic = "unwind"

[profile.release]
codegen-units = 1
debug = true
opt-level = "z"
overflow-checks = false
lto = "fat"

[patch.crates-io]
embassy-executor = { path = "/Users/haobogu/Projects/rust/embassy/embassy-executor" }
embassy-futures = { path = "/Users/haobogu/Projects/rust/embassy/embassy-futures" }
embassy-embedded-hal = { path = "/Users/haobogu/Projects/rust/embassy/embassy-embedded-hal" }
embassy-hal-internal = { path = "/Users/haobogu/Projects/rust/embassy/embassy-hal-internal" }
embassy-nrf = { path = "/Users/haobogu/Projects/rust/embassy/embassy-nrf" }
embassy-sync = { path = "/Users/haobogu/Projects/rust/embassy/embassy-sync" }
embassy-time = { path = "/Users/haobogu/Projects/rust/embassy/embassy-time" }
embassy-usb = { path = "/Users/haobogu/Projects/rust/embassy/embassy-usb" }
embassy-usb-synopsys-otg = { path = "/Users/haobogu/Projects/rust/embassy/embassy-usb-synopsys-otg" }