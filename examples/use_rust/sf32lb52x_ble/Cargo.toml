[package]
name = "rmk-sf32lb52x-ble"
version = "0.2.0"
authors = ["Haobo Gu <haobogu@outlook.com>", "Decaday<myDecaday@outlook.com>"]
description = "BLE Keyboard firmware for SF32LB52x written in Rust"
homepage = "https://github.com/haobogu/rmk"
repository = "https://github.com/haobogu/rmk"
readme = "../../README.md"
edition = "2024"
license = "MIT OR Apache-2.0"

[dependencies]
rmk = { path = "../../../rmk", default-features = false, features = [
    "sf32lb52x_ble",
    "defmt",
    "storage",
    "vial",
] }

sifli-hal = { path = "/Users/haobogu/Projects/rust/sifli-rs/sifli-hal", features = [
    "defmt",
    "sf32lb52x",
    "unstable-pac",
    "time-driver-gptim2",
] }
sifli-radio = { path = "/Users/haobogu/Projects/rust/sifli-rs/sifli-radio", features = [
    "sf32lb52x-lcpu",
    "defmt",
] }

trouble-host = { git = "https://github.com/haobogu/trouble", rev = "e96bdadda8806b1f6257978549746a516f73cf3d", features = [
    "defmt",
    "peripheral",
    "gatt",
    "derive",
    "security",
] }
bt-hci = { version = "0.8", features = ["defmt"] }
rand_core = { version = "0.6", default-features = false }
rand_chacha = { version = "0.3", default-features = false }

embassy-time = { version = "0.5", features = [
    "defmt",
    "defmt-timestamp-uptime",
    "tick-hz-32_768",
] }
embassy-executor = { version = "0.10", features = [
    "defmt",
    "platform-cortex-m",
    "executor-thread",
] }
embassy-futures = { version = "0.1" }
embassy-sync = { version = "0.7" }
cortex-m-rt = { version = "0.7.3", features = ["set-sp", "set-vtor"] }
portable-atomic = { version = "1.11" }
defmt = "1.0"
defmt-rtt = "1.0"
panic-probe = { version = "1.0", features = ["print-defmt"] }
cortex-m = { version = "0.7.7", features = ["critical-section-single-core"] }
static_cell = "2"

[build-dependencies]
xz2 = "0.1.7"
json = "0.12"
const-gen = "1.6"

[[bin]]
name = "rmk-sf32lb52x-ble"
test = false
bench = false

[profile.dev]
codegen-units = 1      # better optimizations
debug = true
opt-level = "s"
overflow-checks = true
lto = "fat"
panic = 'unwind'

[profile.release]
codegen-units = 1       # better optimizations
debug = true            # no overhead for bare-metal
opt-level = "z"         # optimize for binary size
overflow-checks = false
lto = "fat"
