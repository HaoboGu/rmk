[rmk]
chip = "rp2040"
split_peripherals_num = 1

[split]
connection = "serial"

[split.central]
rows = 2
cols = 2
matrix = { rows = 2, cols = 2 }

[[split.peripheral]]
rows = 2
cols = 1
row_offset = 2
col_offset = 2
matrix = { rows = 2, cols = 1 }

[layout]
rows = 4
cols = 3

[[layout.layers]]
name = "default"
keymap = [
  ["KC_A", "KC_B", "KC_C"],
  ["KC_D", "KC_E", "KC_F"],
  ["KC_G", "KC_H", "KC_I"],
  ["KC_J", "KC_K", "KC_L"],
]
