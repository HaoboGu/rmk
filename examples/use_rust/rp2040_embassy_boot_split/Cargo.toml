[package]
name = "rmk-rp2040-embassy-boot-split"
version = "0.1.0"
authors = ["RMK contributors"]
description = "RMK example: RP2040 split keyboard with embassy-boot and dfu_split"
homepage = "https://github.com/haobogu/rmk"
repository = "https://github.com/haobogu/rmk"
readme = "../../README.md"
edition = "2021"
license = "MIT OR Apache-2.0"

[dependencies]
rmk = { path = "../../../rmk", features = ["dfu_rp", "split", "dfu_split"] }
embassy-time = { version = "0.5", features = ["defmt"] }
embassy-rp = { version = "0.10", features = ["rp2040", "defmt", "time-driver", "critical-section-impl"] }
embassy-executor = { version = "0.10", features = ["defmt", "platform-cortex-m", "executor-thread"] }
cortex-m-rt = { version = "0.7.5", features = ["set-vtor"] }
static_cell = "2"
portable-atomic = { version = "1.11", features = ["critical-section"] }
defmt = "1.0"
defmt-rtt = "1.0"
panic-probe = { version = "1.0", features = ["print-defmt"] }

[build-dependencies]
const-gen = "1.6"
json = "0.12"
xz2 = "0.1.7"

[[bin]]
path = "src/central.rs"
name = "rmk-rp2040-embassy-boot-split-central"

[[bin]]
path = "src/peripheral.rs"
name = "rmk-rp2040-embassy-boot-split-peripheral"

[profile.release]
opt-level = "z"
debug = true
lto = true
codegen-units = 1
overflow-checks = false

[profile.dev]
opt-level = 1
debug = true
lto = false
codegen-units = 1
panic = "unwind"
overflow-checks = true
