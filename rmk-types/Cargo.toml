[package]
name = "rmk-types"
version = "0.2.2"
edition = "2024"
authors = ["Haobo Gu <haobogu@outlook.com>"]
description = "Common types in RMK"
homepage = "https://github.com/haobogu/rmk"
repository = "https://github.com/haobogu/rmk"
license = "MIT OR Apache-2.0"
resolver = "2"

[dependencies]
defmt = { version = "1.0", optional = true }

serde = { version = "1", default-features = false, features = ["derive"] }
postcard = { version = "1", features = ["experimental-derive"] }
postcard-schema = { version = "0.2", default-features = false, features = ["derive", "heapless-v0_9"], optional = true }
postcard-rpc = { version = "0.12", default-features = false, optional = true }
heapless = { version = "0.9", default-features = false, features = ["serde"], optional = true }
strum = { version = "0.28", default-features = false, features = ["derive"] }

bitfield-struct = "0.12"

[features]
default = []
## Enable RMK protocol ICD types, endpoints, and topics (pulls in postcard-schema, postcard-rpc, heapless)
protocol = ["dep:postcard-schema", "dep:postcard-rpc", "dep:heapless"]
defmt = [
    "dep:defmt",
    "postcard/defmt",
]
# Feature for proc-macro code generation only, not included in firmware
_codegen = []
